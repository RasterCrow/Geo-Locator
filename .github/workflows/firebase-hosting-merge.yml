name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
        env:
          CI: false
          VITE_API_KEY: ${{ secrets.REACT_APP_API_KEY }}
          VITE_AUTHDOMAIN: ${{ secrets.REACT_APP_AUTHDOMAIN }}
          VITE_BASEURL: ${{ secrets.REACT_APP_BASEURL }}
          VITE_PROJECT_ID: ${{ secrets.REACT_APP_PROJECT_ID }}
          VITE_STORAGEBUCKET: ${{ secrets.REACT_APP_STORAGEBUCKET }}
          VITE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_MESSAGING_SENDER_ID }}
          VITE_APP_ID: ${{ secrets.REACT_APP_APP_ID }}
          VITE_MEASUREMENT_ID: ${{ secrets.REACT_APP_MEASUREMENT_ID }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_UNIQUE_TERMINUS_301015 }}
          channelId: live
          projectId: unique-terminus-301015
